name: AI DevOps Copilot CI

on:
  push:
    branches:
      - main
      - aws-deploy

  pull_request:
    branches:
      - main
      - aws-deploy

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Backend Dependencies
        run: pip install -r requirements.backend.txt

      - name: Install Frontend Dependencies
        run: pip install -r requirements.frontend.txt

      # ⭐ ADD THIS STEP
      - name: Create .env
        run: |
          echo "BACKEND_URL=http://backend:8000" > .env
          echo "ADMIN_USERNAME=admin" >> .env
          echo "ADMIN_PASSWORD=admin123" >> .env
          echo "GROQ_API_KEY=dummy_key" >> .env

      - name: Verify Python Files
        run: |
          python -m py_compile app.py
          python -m py_compile frontend.py

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build Backend Docker
        run: docker build -t ai-backend -f Dockerfile.backend .

      - name: Build Frontend Docker
        run: docker build -t ai-frontend -f Dockerfile.frontend .